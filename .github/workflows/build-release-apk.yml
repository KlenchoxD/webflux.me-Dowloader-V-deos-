name: "Build signed release APK"
on:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: 'main'
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: "Decode keystore"
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/vdown.jks
      - name: "Build release APK"
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: vdown.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: "Sign APK"
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore app/vdown.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.KEY_ALIAS }}
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/MayBox-signed.apk
      - name: "Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: MayBox-signed
          path: app/build/outputs/apk/release/MayBox-signed.apk