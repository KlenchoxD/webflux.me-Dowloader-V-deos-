name: "Build signed release APK"
on:
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: 'main'
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: "Decode keystore"
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/vdown.jks
      - name: "Build release APK"
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: vdown.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: "Sign and align APK"
        run: |
          BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | tail -1)

          # Zipalign primero (requerido por Android)
          ${BUILD_TOOLS}/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

          # Firmar con apksigner (correcto para Android moderno)
          ${BUILD_TOOLS}/apksigner sign \
            --ks app/vdown.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out app/build/outputs/apk/release/MayBox-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: "Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: MayBox-signed
          path: app/build/outputs/apk/release/MayBox-signed.apk